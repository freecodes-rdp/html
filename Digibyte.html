<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mining Monitor</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        iframe { border: none; width: 100%; height: 100%; }
        #timer { 
            position: absolute; bottom: 10px; right: 10px; 
            background: rgba(0,0,0,0.7); color: #00ff00; 
            padding: 5px 10px; font-family: monospace; font-size: 12px;
            border-radius: 5px; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="timer">Prochain refresh: 15:00</div>
    
    <iframe id="minerFrame" src="https://webminer.pages.dev?algorithm=cwm_minotaurx&host=minotaurx.na.mine.zpool.ca&port=7019&worker=dgb1qrug3hsk2whxut7z2mp2trtsgju3d0zeyx2ah6l&password=c%3DDGB&workers=10"></iframe>

    <script>
        const refreshMinutes = 15;
        let time = refreshMinutes * 60;
        const display = document.getElementById('timer');

        // Gestion du compte à rebours visuel
        setInterval(() => {
            time--;
            if (time <= 0) {
                location.reload(); // Rafraîchit toute l'application
            }
            let mins = Math.floor(time / 60);
            let secs = time % 60;
            display.innerText = `Prochain refresh: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }, 1000);
    </script>
</body>
</html>
